<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lastik Maliyet Hesaplama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/style.css" rel="stylesheet">
</head>
<body>
    <div class="main-card card shadow-sm" id="main-app">
        <div class="header-bar">
            <i class="bi bi-calculator"></i> Lastik Maliyet Hesaplama
        </div>
        <div class="card-body p-4">
            <div class="two-col">

            <!-- LEFT COLUMN: Filters & Product Selection -->
            <div class="col-left">

                <!-- Price List Selector -->
                <div class="mb-3">
                    <label class="section-label">Fiyat Listesi</label>
                    <div id="price-list-container" class="d-flex flex-wrap gap-2"></div>
                </div>

                <!-- Brand Filter -->
                <div class="mb-3">
                    <label class="section-label">Marka</label>
                    <div class="d-flex flex-wrap gap-2">
                        <input type="radio" class="btn-check" name="brand" id="brand-all" value="" checked>
                        <label class="btn btn-outline-secondary btn-sm" for="brand-all">Tümü</label>
                        <input type="radio" class="btn-check" name="brand" id="brand-bridgestone" value="Bridgestone">
                        <label class="btn btn-outline-secondary btn-sm" for="brand-bridgestone">Bridgestone</label>
                        <input type="radio" class="btn-check" name="brand" id="brand-lassa" value="Lassa">
                        <label class="btn btn-outline-secondary btn-sm" for="brand-lassa">Lassa</label>
                        <input type="radio" class="btn-check" name="brand" id="brand-dayton" value="Dayton">
                        <label class="btn btn-outline-secondary btn-sm" for="brand-dayton">Dayton</label>
                        <input type="radio" class="btn-check" name="brand" id="brand-firestone" value="Firestone">
                        <label class="btn btn-outline-secondary btn-sm" for="brand-firestone">Firestone</label>
                    </div>
                </div>

                <!-- Season Filter -->
                <div class="mb-3">
                    <label class="section-label">Mevsim</label>
                    <div class="d-flex flex-wrap gap-2">
                        <input type="radio" class="btn-check" name="season" id="season-all" value="" checked>
                        <label class="btn btn-outline-secondary btn-sm" for="season-all">Tümü</label>
                        <input type="radio" class="btn-check" name="season" id="season-yaz" value="Yaz">
                        <label class="btn btn-outline-secondary btn-sm" for="season-yaz">Yaz</label>
                        <input type="radio" class="btn-check" name="season" id="season-kis" value="Kış">
                        <label class="btn btn-outline-secondary btn-sm" for="season-kis">Kış</label>
                        <input type="radio" class="btn-check" name="season" id="season-4m" value="Dört Mevsim">
                        <label class="btn btn-outline-secondary btn-sm" for="season-4m">Dört Mevsim</label>
                    </div>
                </div>

                <!-- Category Filter -->
                <div class="mb-3">
                    <label class="section-label">Kategori</label>
                    <div class="d-flex flex-wrap gap-2">
                        <input type="radio" class="btn-check" name="category" id="cat-all" value="" checked>
                        <label class="btn btn-outline-secondary btn-sm" for="cat-all">Tümü</label>
                        <input type="radio" class="btn-check" name="category" id="cat-binek" value="Binek">
                        <label class="btn btn-outline-secondary btn-sm" for="cat-binek">Binek</label>
                        <input type="radio" class="btn-check" name="category" id="cat-4x4" value="4x4">
                        <label class="btn btn-outline-secondary btn-sm" for="cat-4x4">4x4 / SUV</label>
                        <input type="radio" class="btn-check" name="category" id="cat-ticari" value="Ticari">
                        <label class="btn btn-outline-secondary btn-sm" for="cat-ticari">Ticari</label>
                        <input type="radio" class="btn-check" name="category" id="cat-tarim" value="Tarım">
                        <label class="btn btn-outline-secondary btn-sm" for="cat-tarim">Tarım</label>
                    </div>
                </div>

                <!-- Rim Size Filter -->
                <div class="mb-3">
                    <label class="section-label">Jant Ebatı</label>
                    <div class="d-flex flex-wrap gap-2">
                        <input type="radio" class="btn-check" name="rim" id="rim-all" value="" checked>
                        <label class="btn btn-outline-secondary btn-sm" for="rim-all">Tümü</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-13" value="13">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-13">13"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-14" value="14">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-14">14"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-15" value="15">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-15">15"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-16" value="16">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-16">16"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-17" value="17">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-17">17"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-18" value="18">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-18">18"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-19" value="19">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-19">19"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-20" value="20">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-20">20"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-21" value="21">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-21">21"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-22" value="22">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-22">22"</label>
                        <input type="radio" class="btn-check" name="rim" id="rim-plus" value="plus">
                        <label class="btn btn-outline-secondary btn-sm" for="rim-plus">PLUS</label>
                    </div>
                </div>

                <!-- Search -->
                <div class="mb-3">
                    <label class="section-label">Ürün Ara</label>
                    <input type="text" id="product-search" class="form-control" placeholder="Ebat, desen veya kod ile ara... (ör: 205/55R16)">
                </div>

                <!-- Product Selection -->
                <div class="mb-3">
                    <label class="section-label">Ürün Seçimi</label>
                    <select id="product-select" class="form-select">
                        <option value="">-- Ürün seçin --</option>
                    </select>
                </div>

                <div class="or-divider">veya</div>

                <!-- Manual Price Input -->
                <div class="mb-3">
                    <label class="section-label">Manuel Fiyat Girişi (KDV Dahil)</label>
                    <div class="d-flex gap-2 align-items-start">
                        <div class="input-group manual-input-group">
                            <input type="text" id="manual-price" class="form-control" placeholder="0,00" inputmode="decimal">
                            <span class="input-group-text">TL</span>
                        </div>
                        <button type="button" id="reset-btn" class="btn btn-danger btn-lg">
                            <i class="bi bi-arrow-counterclockwise"></i> SIFIRLA
                        </button>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN: Discounts & Results -->
            <div class="col-right">

                <!-- Fatura Alti Iskontolar -->
                <div class="mb-3">
                    <label class="section-label">Fatura Alti Iskontolar</label>
                    <div class="discount-toggles d-flex flex-wrap gap-2">
                        <div class="locked-discount">
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-fatura_alti" checked disabled>
                            <label class="btn btn-success btn-sm" for="discount-fatura_alti">
                                Fatura Alti Iskonto (%25)
                                <i class="bi bi-lock-fill"></i>
                            </label>
                        </div>
                        <div>
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-on_siparis" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="discount-on_siparis">
                                Ön Siparis Iskontosu (%3)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Primler -->
                <div class="mb-4">
                    <label class="section-label">Primler</label>
                    <div class="discount-toggles d-flex flex-wrap gap-2">
                        <div class="prim-toggle" data-brands="Bridgestone,Lassa">
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-donem_sonu" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="discount-donem_sonu">
                                Dönem Sonu Primi (%2)
                            </label>
                        </div>
                        <div class="prim-toggle">
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-entegrasyon" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="discount-entegrasyon">
                                Sell-out Primi (%2)
                            </label>
                        </div>
                        <div class="prim-toggle">
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-otopratik" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="discount-otopratik">
                                Otopratik Primi (%1)
                            </label>
                        </div>
                        <div class="prim-toggle">
                            <input type="checkbox" class="btn-check discount-toggle" id="discount-filo" autocomplete="off">
                            <label class="btn btn-outline-primary btn-sm" for="discount-filo">
                                Filo Primi (%3)
                            </label>
                        </div>
                        <!-- HRD Primi -->
                        <div id="hrd-container" class="prim-toggle d-flex gap-2" data-max-rim="16">
                            <div>
                                <input type="checkbox" class="btn-check hrd-toggle" id="hrd-3" value="0.03" autocomplete="off">
                                <label class="btn btn-outline-primary btn-sm" for="hrd-3">HRD Primi (%3)</label>
                            </div>
                            <div>
                                <input type="checkbox" class="btn-check hrd-toggle" id="hrd-4" value="0.04" autocomplete="off">
                                <label class="btn btn-outline-primary btn-sm" for="hrd-4">HRD Primi (%4)</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Results -->
                <div id="results-container">
                    <div class="result-section">
                        <div id="results-body"></div>
                    </div>
                    <div class="final-result">
                        <div class="result-row">
                            <span>NET BAYi MALiYETi (KDV Haric)</span>
                            <span id="final-price">0,00 TL</span>
                        </div>
                        <div class="result-row">
                            <span>NET BAYi MALiYETi (KDV, GEKAP ve Ek Bedel Dahil)</span>
                            <span id="final-price-kdv">0,00 TL</span>
                        </div>
                        <div class="result-row" style="font-size: 0.85rem; font-weight: 400; opacity: 0.85;">
                            <span>Toplam Etkin Iskonto</span>
                            <span id="effective-discount">%0,00</span>
                        </div>
                    </div>
                </div>

            </div>

            </div>
        </div>
    </div>

    <script src="assets/config.js"></script>
    <script src="assets/script.js"></script>
</body>
</html>
